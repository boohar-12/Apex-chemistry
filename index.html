<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Academy | Chemistry Excellence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* SES-Style Theme */
        :root {
            --bg-body: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00f2fe;
        }

        body {
            background-color: var(--bg-body);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
        }

        .wrapper { max-width: 900px; margin: auto; padding: 50px 20px; }

        /* SES Logo Style */
        .logo {
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 50px;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Glass Cards */
        .glass {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
        }

        .neon-btn {
            background: var(--accent);
            color: #000;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .neon-btn:hover { box-shadow: 0 0 20px var(--accent); }

        .split { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="wrapper">
        <div class="logo">APEX ACADEMY</div>

        <div class="glass" style="text-align:center;">
            <h1>Chemistry Excellence</h1>
            <p style="color:#aaa;">Professional coaching for 9th to 12th Grade.</p>
        </div>

        <div class="split">
            <div class="glass">
                <h3><i class="fa-solid fa-pen"></i> Admission Form</h3>
                <form action="https://formsubmit.co/nasarullahboohar804@gmail.com" method="POST">
                    <input type="text" name="name" placeholder="Name" required>
                    <input type="tel" name="phone" placeholder="WhatsApp" required>
                    <select name="class"><option>9th</option><option>10th</option><option>11th</option><option>12th</option></select>
                    <button type="submit" class="neon-btn">Submit Application</button>
                </form>
            </div>

            <div class="glass" style="text-align:center;">
                <h3><i class="fa-solid fa-qrcode"></i> Scan to Chat</h3>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://wa.me/923423672471" style="width:150px; background:white; padding:5px; border-radius:10px; margin-top:10px;">
            </div>
        </div>

        <div class="glass">
            <h3><i class="fa-solid fa-file-pdf"></i> Resources</h3>
            <p>Free PDF Notes: <b style="color:var(--accent);">Available Soon</b></p>
        </div>
    </div>

    <script>
        /* SES-Style Particle Animation */
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<100; i++) particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, sx: Math.random()-0.5, sy: Math.random()-0.5});
        }
        
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#00f2fe";
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1, 0, Math.PI*2);
                ctx.fill();
                p.x += p.sx; p.y += p.sy;
                if(p.x<0 || p.x>canvas.width) p.sx*=-1;
                if(p.y<0 || p.y>canvas.height) p.sy*=-1;
            });
            requestAnimationFrame(draw);
        }
        init(); draw();
    </script>
</body>
</html>
