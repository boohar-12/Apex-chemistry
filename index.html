<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Academy | Chemistry Excellence</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-gradient: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 80%);
            --glass-bg: rgba(30, 41, 59, 0.5);
            --border-glow: rgba(56, 189, 248, 0.4);
            --accent-cyan: #06b6d4;
            --text-main: #f1f5f9;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-wrapper {
            width: 90%;
            max-width: 850px;
            padding: 40px;
        }

        .brand {
            text-align: center;
            margin-bottom: 50px;
        }

        .brand h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glow);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        h3 { color: var(--accent-cyan); margin-bottom: 20px; font-size: 1.2rem; }

        input, select {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            padding: 14px;
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            background: var(--accent-cyan);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { filter: brightness(1.2); }

        .qr-box {
            text-align: center;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #334155;
        }

        @media (max-width: 700px) {
            .grid-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="brand">
            <h1>APEX ACADEMY</h1>
            <p style="color: var(--accent-cyan); font-weight: 600;">CHEMISTRY EXCELLENCE</p>
        </div>

        <div class="glass-container">
            <div class="grid-layout">
                <!-- Admission Form -->
                <div>
                    <h3>Admission Form</h3>
                    <form action="https://formsubmit.co/nasarullahboohar804@gmail.com" method="POST">
                        <input type="text" name="name" placeholder="Student Name" required>
                        <input type="tel" name="phone" placeholder="WhatsApp Number" required>
                        <select name="class">
                            <option>9th Grade</option>
                            <option>10th Grade</option>
                            <option>11th Grade</option>
                            <option>12th Grade</option>
                        </select>
                        <button type="submit">Submit Application</button>
                    </form>
                </div>

                <!-- QR Scan Desk -->
                <div class="qr-box">
                    <h3>Scan to Chat</h3>
                    <div style="background:white; padding:10px; border-radius:12px; display:inline-block;">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://wa.me/923423672471" style="display:block;">
                    </div>
                </div>
            </div>

            <div style="margin-top:40px; border-top:1px solid #334155; padding-top:30px;">
                <h3>Resources</h3>
                <p style="color:#94a3b8;">Free PDF Notes: <span style="color:var(--accent-cyan)">Available Soon</span></p>
            </div>
        </div>
    </div>

</body>
</html>
