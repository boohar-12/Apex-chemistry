<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Academy Chemistry | Sir Nasarullah</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep-navy: #050811;
            --gradient-dark: linear-gradient(180deg, #050811 0%, #02040a 100%);
            --accent-cyan: #00f2fe;
            --accent-blue: #4facfe;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(10, 25, 47, 0.7);
            --glass-border: rgba(0, 242, 254, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--gradient-dark);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .app-container {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            margin-bottom: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--accent-cyan);
        }

        .btn-whatsapp {
            background: #25d366;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-whatsapp:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
        }

        .hero-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
            padding: 40px 20px;
        }

        @media (max-width: 768px) {
            .hero-section {
                grid-template-columns: 1fr;
                text-align: center;
            }
            nav { display: none; }
        }

        .hero-text h1 {
            font-size: 48px;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .hero-text h1 span {
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            color: var(--text-muted);
            font-size: 18px;
            margin-bottom: 30px;
        }

        .cta-buttons {
            display: flex;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .cta-buttons { justify-content: center; }
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-cyan));
            color: #050811;
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-light);
            border: 1px solid var(--glass-border);
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary:hover, .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
        }

        .profile-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,242,254,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .profile-img-container {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent-cyan);
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        .profile-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info h3 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .profile-info p {
            color: var(--accent-cyan);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .tag {
            background: rgba(0, 242, 254, 0.1);
            color: var(--accent-cyan);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            border: 1px solid rgba(0, 242, 254, 0.2);
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="app-container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-flask-vial"></i> APEX CHEMISTRY
            </div>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Courses</a></li>
                    <li><a href="#">Notes</a></li>
                </ul>
            </nav>
            <a href="https://wa.me/xxxxxxxxxx" class="btn-whatsapp" target="_blank">
                <i class="fa-brands fa-whatsapp"></i> WhatsApp
            </a>
        </header>

        <section class="hero-section">
            <div class="hero-text">
                <h1>Master Chemistry <br>with <span>Confidence</span></h1>
                <p>Concept-Based Chemistry Learning perfectly structured for Board and Competitive Examinations.</p>
                <div class="cta-buttons">
                    <a href="#" class="btn-primary">Explore Courses</a>
                    <a href="#" class="btn-secondary">Free Notes</a>
                </div>
            </div>

            <div class="profile-card">
                <div class="profile-img-container">
                    <img src="https://i.ibb.co/ksYpD8Sf/image.jpg" alt="Sir Nasarullah">
                </div>
                <div class="profile-info">
                    <h3>Sir Nasarullah</h3>
                    <p>BS Chemistry | Instructor</p>
                    <span class="tag"><i class="fa-solid fa-shield-halved"></i> Scientific Excellence</span>
                </div>
            </div>
        </section>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const particles = [];
        for (let i = 0; i < 60; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2 + 0.5,
                speedX: (Math.random() - 0.5) * 0.3,
                speedY: (Math.random() - 0.5) * 0.3
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'rgba(0, 242, 254, 0.2)';
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();

                p.x += p.speedX;
                p.y += p.speedY;

                if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
